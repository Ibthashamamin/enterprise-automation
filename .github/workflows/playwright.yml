# .github/workflows/playwright.yml
name: Enterprise Regression Suite
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  automation-execution:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Codebase
      uses: actions/checkout@v4

    - name: Initialize Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install Project Dependencies
      run: npm ci

    - name: Install System-Level Browser Dependencies
      run: npx playwright install --with-deps

    - name: Execute UI Regression Tests
      run: npx playwright test --project=ui-tests

    - name: Execute Backend API Tests
      run: npx playwright test --project=api-tests

    - name: Publish Test Execution Artifacts
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: cloud-playwright-report
        path: playwright-report/
        retention-days: 14